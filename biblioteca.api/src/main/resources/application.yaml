  server:
    servlet:
      context-path: /api/v1
    port: 8070

  spring:
    application:
      name: biblioteca-api
    datasource:
      url: jdbc:postgresql://localhost:5432/biblioteca?currentSchema=sulen_biblioteca
      username: postgres
      password: 123456789
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        connection-timeout: 30000
        minimum-idle: 3
        max-lifetime: 180000

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true
      open-in-view: false

    devtools:
      restart:
        enabled: true
      livereload:
        enabled: true
